<!DOCTYPE html>
<html>
<head>
    <title>AI Deepfake Detector</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            text-align: center;

            /* 🌈 10 COLOR GRADIENT */
            background: linear-gradient(135deg,
                #ff9a9e,
                #fad0c4,
                #fbc2eb,
                #a6c1ee,
                #84fab0,
                #8fd3f4,
                #fccb90,
                #d4fc79,
                #96e6a1,
                #cfd9df
            );
        }

        h1 {
            margin-top: 20px;
            color: #222;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.03);
        }

        h3 {
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;

            background: linear-gradient(135deg, #ff512f, #dd2476);
        }

        button:hover {
            opacity: 0.85;
        }

        img, video {
            width: 100%;
            margin-top: 10px;
            border-radius: 10px;
        }

        .result {
            margin-top: 10px;
            font-size: 20px;
            font-weight: bold;
        }

        .navbar {
            background: white;
            padding: 15px;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

    </style>
</head>

<body>

<div class="navbar">🤖 AI Deepfake Detector</div>

<h1>Detect Real vs Fake + Heatmap 🔥</h1>

<div class="container">

    <!-- IMAGE -->
    <div class="card">
        <h3>📸 Image Detection</h3>

        <form action="/predict" method="post" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button>Detect Image</button>
        </form>

        {% if prediction %}
            <div class="result">{{ prediction }}</div>
        {% endif %}

        {% if filename %}
            <img src="{{ url_for('static', filename='uploads/' + filename) }}">
        {% endif %}

        {% if heatmap %}
            <h4>🔥 Heatmap</h4>
            <img src="{{ url_for('static', filename=heatmap) }}">
        {% endif %}
    </div>

    <!-- VIDEO -->
    <div class="card">
        <h3>🎥 Video Detection</h3>

        <form action="/predict_video" method="post" enctype="multipart/form-data">
            <input type="file" name="video" required>
            <button>Detect Video</button>
        </form>
    </div>

    <!-- VOICE -->
    <div class="card">
        <h3>🎤 Voice Detection</h3>

        <form action="/predict_voice" method="post" enctype="multipart/form-data">
            <input type="file" name="audio" required>
            <button>Detect Voice</button>
        </form>
    </div>

    <!-- WEBCAM -->
    <div class="card">
        <h3>🎦 Webcam</h3>
        <a href="/webcam">
            <button>Start Webcam</button>
        </a>
    </div>

    <!-- HEATMAP WEBCAM -->
    <div class="card">
        <h3>🔥 Heatmap Webcam</h3>
        <a href="/webcam_heatmap">
            <button>Start Heatmap</button>
        </a>
    </div>

</div>

</body>
</html>
